<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lego Builder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }
    #canvas { display: block; width: 100vw; height: 100vh; }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 220px;
      padding: 16px 24px;
      background: rgba(22, 33, 62, 0.88);
      border-radius: 8px;
      z-index: 10;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e8eaf6;
    }
    .hud-step-counter {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .hud-step-desc {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      color: rgba(232, 234, 246, 0.6);
    }
    .hud-progress {
      margin-top: 8px;
      height: 4px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .hud-progress-fill {
      height: 100%;
      background: #e94560;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    #tray {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: #16213e;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tray-items {
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: center;
    }
    .tray-item {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: transparent;
      transition: border-color 0.15s;
    }
    .tray-item:hover {
      border-color: rgba(255, 255, 255, 0.20);
    }
    .tray-item.selected {
      border: 2px solid #e94560;
      background: rgba(233, 69, 96, 0.15);
    }
    .tray-swatch {
      width: 40px;
      height: 40px;
      border-radius: 4px;
    }

    /* Selection screen overlay */
    #selection-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(26, 26, 46, 0.96);
      opacity: 1;
      pointer-events: all;
      transition: opacity 0.35s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    #selection-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #selection-screen h1 {
      font-family: system-ui, -apple-system, sans-serif;
      color: #e8eaf6;
      font-size: 28px;
      margin-bottom: 32px;
    }
    #set-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 520px;
      width: 100%;
      padding: 0 24px;
    }

    /* Set card styles */
    .set-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: rgba(22, 33, 62, 0.9);
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: border-color 0.15s;
    }
    .set-card:hover {
      border-color: #e94560;
    }
    .set-card-thumb {
      width: 120px;
      height: 90px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .set-card-info {
      flex: 1;
    }
    .set-card-name {
      font-size: 16px;
      font-weight: 600;
      color: #e8eaf6;
      margin-bottom: 4px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .set-card-desc {
      font-size: 13px;
      color: rgba(232, 234, 246, 0.6);
      margin-bottom: 6px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .set-card-meta {
      font-size: 13px;
      color: rgba(232, 234, 246, 0.5);
      display: flex;
      gap: 12px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .set-card-stars {
      color: #e94560;
    }

    /* Back button */
    #back-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(22, 33, 62, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      color: #e8eaf6;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 12px;
      font-family: system-ui, -apple-system, sans-serif;
      display: none;
    }

    /* Completion screen overlay */
    #completion-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(26, 26, 46, 0.85);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #completion-screen.visible {
      opacity: 1;
      pointer-events: all;
    }
    .completion-content {
      text-align: center;
    }
    .completion-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #e8eaf6;
      margin-bottom: 12px;
    }
    .completion-time {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 18px;
      color: rgba(232, 234, 246, 0.7);
      margin-bottom: 32px;
    }
    .completion-btn {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      margin: 0 8px;
      background: #e94560;
      color: #fff;
      transition: background 0.15s;
    }
    .completion-btn:hover {
      background: #d63851;
    }
    .completion-btn-secondary {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #e8eaf6;
    }
    .completion-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Selection screen overlay — visible by default (landing page) -->
  <div id="selection-screen">
    <h1>Lego Builder</h1>
    <div id="set-list"></div>
  </div>

  <!-- Back button — shown only during build -->
  <button id="back-btn">&#x2190; Back</button>

  <!-- Completion screen overlay — hidden by default, shown on build complete -->
  <div id="completion-screen">
    <div class="completion-content">
      <h1 class="completion-title">Build Complete!</h1>
      <div class="completion-time" id="completion-time"></div>
      <div class="completion-actions">
        <button class="completion-btn" id="build-again-btn">Build Again</button>
        <button class="completion-btn completion-btn-secondary" id="new-set-btn">New Set</button>
      </div>
    </div>
  </div>

  <div id="hud"></div>
  <div id="tray">
    <div class="tray-items"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>

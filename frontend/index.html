<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lego Builder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }
    #canvas { display: block; width: 100vw; height: 100vh; }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 220px;
      padding: 16px 24px;
      background: rgba(22, 33, 62, 0.88);
      border-radius: 8px;
      z-index: 10;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e8eaf6;
    }
    .hud-step-counter {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .hud-step-desc {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      color: rgba(232, 234, 246, 0.6);
    }
    .hud-progress {
      margin-top: 8px;
      height: 4px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .hud-progress-fill {
      height: 100%;
      background: #e94560;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    #tray {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: #16213e;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tray-items {
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: center;
    }
    .tray-item {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: transparent;
      transition: border-color 0.15s;
    }
    .tray-item:hover {
      border-color: rgba(255, 255, 255, 0.20);
    }
    .tray-item.selected {
      border: 2px solid #e94560;
      background: rgba(233, 69, 96, 0.15);
    }
    .tray-swatch {
      width: 40px;
      height: 40px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <div id="tray">
    <div class="tray-items"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
